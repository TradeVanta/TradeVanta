<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Withdraw</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #000;
      color: #FFF;
    }
    .header {
      background-color: #091DFC;
      padding: 16px;
      text-align: center;
      font-size: 18px;
      font-weight: bold;
    }
    .container {
      padding: 20px;
    }
    .card {
      background-color: #091DFC;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 20px;
    }
    .withdraw-section {
      text-align: center;
    }
    .withdraw-section input {
      font-size: 24px;
      text-align: center;
      border: none;
      border-bottom: 1px solid #ccc;
      background-color: #000;
      color: #FFF;
      outline: none;
    }
    .error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }
    .bank-info, .add-bank-form {
      margin-top: 30px;
      padding: 15px;
      border: 1px solid #eee;
      border-radius: 10px;
    }
    .bank-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .add-bank-form {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .add-bank-form input {
      width: 90%;
      margin: 8px 0;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    .withdraw-btn, .confirm-btn, .add-bank-btn {
      margin-top: 20px;
      padding: 15px;
      width: 100%;
      border: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      background-color: #333;
      color: #999;
      cursor: not-allowed;
    }
    .withdraw-btn.active, .confirm-btn.active {
      background-color: #091DFC;
      color: #fff;
      cursor: pointer;
    }
    .add-bank-btn {
      background-color: #091DFC;
      color: #fff;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">Withdraw</div>

<div class="container">
  <div class="card">
    <p><strong><span id="currency-symbol">$</span><span id="balance">0.00</span></strong></p>           
    <h3>Available</h3>
  </div>

  <div class="withdraw-section">
    <label for="amount"></label>
    <span style="font-size: 24px;" id="input-currency"></span>
    <input type="number" id="amount" min="0" />
    <h4>Withdraw Amount</h4>
  </div>

  <div id="bank-placeholder">
    <button id="add-bank-btn" class="add-bank-btn">Add Bank Account</button>
  </div>

  <div id="error-message" class="error">Amount must not exceed your balance</div>
  <button id="withdraw-btn" class="withdraw-btn" disabled>WITHDRAW</button>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC0seQcc9v7ms5OqUCPi7rxaN4pJdP8zlE",
    authDomain: "withdrawapp-eb9a9.firebaseapp.com",
    projectId: "withdrawapp-eb9a9"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  const firebaseConfigBalance = {
    apiKey: "AIzaSyDtCfsMkc_Z_9ZeF0TEHTDFBzLlkU-egSc",
    authDomain: "tradevanta-a3e0d.firebaseapp.com",
    projectId: "tradevanta-a3e0d"
  };
  const balanceApp = firebase.initializeApp(firebaseConfigBalance, "balanceApp");
  const dbBalance = firebase.firestore(balanceApp);

  const currencySymbols = {
    USD: '$', EUR: '€', GBP: '£', INR: '₹',
    CAD: 'C$', AUD: 'A$', NGN: '₦', JPY: '¥'
  };

  let userId = null;
  let userBalance = 0;
  let userCurrency = 'USD';
  let bankAdded = false;

  const amountInput = document.getElementById('amount');
  const withdrawBtn = document.getElementById('withdraw-btn');
  const errorMessage = document.getElementById('error-message');
  const balanceEl = document.getElementById('balance');
  const currencySymbolEl = document.getElementById('currency-symbol');
  const inputCurrencyEl = document.getElementById('input-currency');
  const bankPlaceholder = document.getElementById('bank-placeholder');
  const addBankBtn = document.getElementById('add-bank-btn');

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = 'register.html';
      return;
    }
    userId = user.uid;
    await fetchUserInfo();
    await checkBankAccount();
  });

  async function fetchUserInfo() {
    const doc = await dbBalance.collection("users").doc(userId).get();
    if (doc.exists) {
      const data = doc.data();
      userBalance = data.balance || 0;
      userCurrency = data.currency || 'USD';
      const symbol = currencySymbols[userCurrency] || '';
      balanceEl.textContent = userBalance.toFixed(2);
      currencySymbolEl.textContent = symbol;
      inputCurrencyEl.textContent = symbol;
    }
  }

  async function checkBankAccount() {
    const doc = await db.collection("bankAccounts").doc(userId).get();
    if (doc.exists) {
      const data = doc.data();
      bankPlaceholder.innerHTML = `
        <div class="bank-info">
          <div>
            <div>${data.bankName.toUpperCase()}</div>
            <div>XXXXXX${data.accountNumber.slice(-4)}</div>
          </div>
          <input type="radio" checked />
        </div>
      `;
      bankAdded = true;
      validateAmount();
    }
  }

  amountInput.addEventListener('input', validateAmount);

  function validateAmount() {
    const amount = parseFloat(amountInput.value);
    if (!bankAdded || isNaN(amount) || amount <= 0 || amount > userBalance) {
      withdrawBtn.classList.remove('active');
      withdrawBtn.disabled = true;
      errorMessage.style.display = (amount > userBalance || amount <= 0) ? 'block' : 'none';
    } else {
      withdrawBtn.classList.add('active');
      withdrawBtn.disabled = false;
      errorMessage.style.display = 'none';
    }
  }

  withdrawBtn.addEventListener('click', async () => {
    const amount = parseFloat(amountInput.value);
    if (!userId || isNaN(amount) || amount <= 0 || amount > userBalance) return;

    try {
      await db.collection("withdrawals").add({
        userId,
        amount,
        currency: userCurrency,
        status: "pending",
        createdAt: new Date().toISOString()
      });

      const userRef = dbBalance.collection("users").doc(userId);
      await dbBalance.runTransaction(async (tx) => {
        const doc = await tx.get(userRef);
        const currentBalance = doc.data().balance || 0;
        if (amount > currentBalance) throw "Insufficient balance";
        tx.update(userRef, { balance: currentBalance - amount });
      });

      alert("Withdrawal initiated.");
      window.location.href = "dashboard.html";
    } catch (err) {
      console.error(err);
      alert("Withdrawal failed. Try again.");
    }
  });

  addBankBtn.addEventListener('click', () => {
    bankPlaceholder.innerHTML = `
      <div class="add-bank-form">
        <input type="text" id="firstName" placeholder="Name" />
        <input type="text" id="accountNumber" placeholder="Account Number" />
        <input type="text" id="ifscCode" placeholder="IFSC Code" />
        <input type="text" id="bankName" placeholder="Bank Name" />
        <input type="text" id="mobile" placeholder="Mobile Number" />
        <button id="confirm-btn" class="confirm-btn" disabled>Confirm</button>
      </div>
    `;

    const fields = ['firstName', 'accountNumber', 'ifscCode', 'bankName', 'mobile'].map(id => document.getElementById(id));
    const confirmBtn = document.getElementById('confirm-btn');

    fields.forEach(input => input.addEventListener('input', () => {
      const allFilled = fields.every(input => input.value.trim() !== '');
      confirmBtn.disabled = !allFilled;
      confirmBtn.classList.toggle('active', allFilled);
    }));

    confirmBtn.addEventListener('click', async () => {
      const code = prompt("Enter admin authorization code:");
      const codeDoc = await db.collection("settings").doc("authCode").get();
      if (code !== (codeDoc.exists ? codeDoc.data().code : '')) {
        alert("Invalid code.");
        return;
      }

      const [firstName, accountNumber, ifscCode, bankName, mobile] = fields.map(f => f.value.trim());
      const bankDetails = { userId, firstName, accountNumber, ifscCode, bankName, mobile, addedAt: new Date().toISOString() };

      await db.collection("bankAccounts").doc(userId).set(bankDetails);

      bankPlaceholder.innerHTML = `
        <div class="bank-info">
          <div>
            <div>${bankName.toUpperCase()}</div>
            <div>XXXXXX${accountNumber.slice(-4)}</div>
          </div>
          <input type="radio" checked />
        </div>
      `;

      bankAdded = true;
      validateAmount();
      alert("Bank added successfully.");
    });
  });
</script>

</body>
</html>
