<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Withdraw</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
  /* Base Styles */
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #000000;
    color: #FFFFFF;
  }

  /* Header */
  .header {
    background-color: #091DFC;
    color: #fff;
    padding: 16px;
    font-size: 18px;
  }

  /* Container */
  .container {
    padding: 20px;
  }

  /* Card */
  .card {
    background-color: #091DFC;
    padding: 8px;
    border-radius: 10px;
    margin-bottom: 20px;
  }

  /* Withdraw Section */
  .withdraw-section {
    text-align: center;
    margin-bottom: 10px;
  }

  .withdraw-section input {
    font-size: 28px;
    text-align: center;
    border: none;
    border-bottom: 1px solid #ccc;
    width: 100px;
    outline: none;
  }

  .note {
    font-size: 14px;
    color: #777;
    margin-top: 5px;
  }

  /* Bank Info & Form */
  .bank-info, .add-bank-form {
    margin-top: 30px;
    padding: 15px;
    border: 1px solid #eee;
    border-radius: 10px;
  }

  .bank-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .add-bank-form {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .add-bank-form input {
    width: 90%;
    margin: 8px 0;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  /* Error Message */
  .error {
    color: red;
    font-size: 14px;
    margin-top: 10px;
    text-align: center;
    display: none;
  }

  /* Buttons */
  .withdraw-btn, .confirm-btn, .add-bank-btn {
    margin-top: 30px;
    padding: 15px;
    width: 100%;
    border: none;
    font-size: 16px;
    font-weight: bold;
    border-radius: 8px;
    background-color: #f0f3f7;
    color: #bcc2cc;
    cursor: not-allowed;
  }

  .withdraw-btn.active, .confirm-btn.active {
    background-color: #091DFC;
    color: #fff;
    cursor: pointer;
  }

  .add-bank-btn {
    background-color: #091DFC;
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="header">Request A Withdraw </div>

<div class="container">
  <div class="card">
    <h3>Available Balance </h3>
    <p><strong><span id="currency">₹</span><span id="balance">700</span></strong></p>
  </div>

  <div class="withdraw-section">
    <label for="amount"></label><br/>
    <span style="font-size: 24px;" id="input-currency">₹</span>
    <input type="number" id="amount" min="0" />
  </div>

  <div id="bank-placeholder">
    <button id="add-bank-btn" class="add-bank-btn">Add Bank Account</button>
  </div>

  <div id="error-message" class="error">Amount must not exceed your balance</div>
  <button id="withdraw-btn" class="withdraw-btn" disabled>WITHDRAW</button>
</div>

<script>
  // Initialize Firebase for withdrawals
  const firebaseConfig = {
    apiKey: "AIzaSyC0seQcc9v7ms5OqUCPi7rxaN4pJdP8zlE",
    authDomain: "withdrawapp-eb9a9.firebaseapp.com",
    projectId: "withdrawapp-eb9a9",
    storageBucket: "withdrawapp-eb9a9.appspot.com",
    messagingSenderId: "482698678271",
    appId: "1:482698678271:web:669173ee71c85130b621ca"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  // Initialize secondary Firebase for balance and user info
  const firebaseConfigBalance = {
    apiKey: "AIzaSyDtCfsMkc_Z_9ZeF0TEHTDFBzLlkU-egSc",
    authDomain: "tradevanta-a3e0d.firebaseapp.com",
    projectId: "tradevanta-a3e0d"
  };
  const appBalance = firebase.initializeApp(firebaseConfigBalance, "balanceApp");
  const dbBalance = firebase.firestore(appBalance);

  // UI elements
  const amountInput = document.getElementById('amount');
  const withdrawBtn = document.getElementById('withdraw-btn');
  const errorMessage = document.getElementById('error-message');
  const balanceEl = document.getElementById('balance');
  const currencyEls = [document.getElementById('currency'), document.getElementById('input-currency')];
  const bankPlaceholder = document.getElementById('bank-placeholder');
  const addBankBtn = document.getElementById('add-bank-btn');

  // State
  let userId;
  let userBalance = 0;
  let userCurrency = '₹';
  let bankData = null;

  // 🔐 Authenticate and fetch balance + bank
  firebase.auth().onAuthStateChanged(async (user) => {
    if (user) {
      userId = user.uid;
      await fetchUserInfo();
      await checkBankAccount();
    } else {
      window.location.href = "register.html";
    }
  });

  // Get balance and currency from Firestore
  async function fetchUserInfo() {
    const doc = await dbBalance.collection("users").doc(userId).get();
    if (doc.exists) {
      const data = doc.data();
      userBalance = parseFloat(data.balance) || 0;
      userCurrency = data.currency || '₹';
      balanceEl.textContent = userBalance;
      currencyEls.forEach(el => el.textContent = userCurrency);
    }
  }

  // Check for saved bank info
  async function checkBankAccount() {
    const bankDoc = await db.collection('bankAccounts').doc(userId).get();
    if (bankDoc.exists) {
      bankData = bankDoc.data();
      bankPlaceholder.innerHTML = `
        <div class="bank-info">
          <div>
            <div>${bankData.bankName.toUpperCase()}</div>
            <div>XXXXXX${bankData.accountNumber.slice(-4)}</div>
          </div>
          <input type="radio" checked />
        </div>
      `;
      validateAmount();
    }
  }

  // Validate withdrawal input
  function validateAmount() {
    const amount = parseFloat(amountInput.value);
    if (!bankData || isNaN(amount) || amount <= 0 || amount > userBalance) {
      withdrawBtn.classList.remove('active');
      withdrawBtn.disabled = true;
      errorMessage.style.display = (amount > userBalance || amount <= 0) ? 'block' : 'none';
    } else {
      withdrawBtn.classList.add('active');
      withdrawBtn.disabled = false;
      errorMessage.style.display = 'none';
    }
  }

  amountInput.addEventListener('input', validateAmount);

  // 💸 Withdraw button click
  withdrawBtn.addEventListener('click', async () => {
    const amount = parseFloat(amountInput.value);
    if (!userId || !bankData || isNaN(amount) || amount > userBalance) return;

    const newBalance = userBalance - amount;

    // Step 1: Save withdrawal request
    await db.collection("withdrawals").add({
      userId: userId,
      amount: amount,
      currency: userCurrency,
      bankName: bankData.bankName,
      accountNumber: bankData.accountNumber,
      ifscCode: bankData.ifscCode,
      requestedAt: new Date().toISOString(),
      status: "pending"
    });

    // Step 2: Update user balance
    await dbBalance.collection("users").doc(userId).update({
      balance: newBalance
    });

    // Step 3: Update UI
    userBalance = newBalance;
    balanceEl.textContent = userBalance;

    alert("✅ Withdrawal submitted and balance updated!");
    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 2000);
  });

  // 🏦 Add Bank Button click
  addBankBtn.addEventListener('click', () => {
    bankPlaceholder.innerHTML = `
      <div class="add-bank-form">
        <input type="text" id="firstName" placeholder="Name" />
        <input type="text" id="accountNumber" placeholder="Account Number" />
        <input type="text" id="ifscCode" placeholder="IFSC Code" />
        <input type="text" id="bankName" placeholder="Bank Name" />
        <input type="text" id="mobile" placeholder="Mobile Number" />
        <button id="confirm-btn" class="confirm-btn" disabled>Confirm</button>
      </div>
    `;

    const inputs = {
      firstName: document.getElementById('firstName'),
      accountNumber: document.getElementById('accountNumber'),
      ifscCode: document.getElementById('ifscCode'),
      bankName: document.getElementById('bankName'),
      mobile: document.getElementById('mobile')
    };
    const confirmBtn = document.getElementById('confirm-btn');

    const validateForm = () => {
      const allFilled = Object.values(inputs).every(input => input.value.trim() !== '');
      confirmBtn.disabled = !allFilled;
      confirmBtn.classList.toggle('active', allFilled);
    };

    Object.values(inputs).forEach(input => input.addEventListener('input', validateForm));

    confirmBtn.addEventListener('click', async () => {
      if (!confirmBtn.classList.contains('active')) return;

      const enteredCode = prompt("Enter the admin validation code to add your bank account:");

      const codeDoc = await db.collection("settings").doc("authCode").get();
      const validCode = codeDoc.exists ? codeDoc.data().code : null;

      if (enteredCode !== validCode) {
        alert("❌ Invalid admin code. Bank account not added.");
        return;
      }

      const bankDetails = {
        userId,
        firstName: inputs.firstName.value.trim(),
        accountNumber: inputs.accountNumber.value.trim(),
        ifscCode: inputs.ifscCode.value.trim(),
        bankName: inputs.bankName.value.trim(),
        mobile: inputs.mobile.value.trim(),
        addedAt: new Date().toISOString()
      };

      await db.collection('bankAccounts').doc(userId).set(bankDetails);

      bankPlaceholder.innerHTML = `
        <div class="bank-info">
          <div>
            <div>${bankDetails.bankName.toUpperCase()}</div>
            <div>XXXXXX${bankDetails.accountNumber.slice(-4)}</div>
          </div>
          <input type="radio" checked />
        </div>
      `;

      bankData = bankDetails;
      validateAmount();
      alert("✅ Bank account added successfully!");
    });
  });
</script>
</body>
</html>
